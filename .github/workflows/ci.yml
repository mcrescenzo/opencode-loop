name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node-test:
    name: node test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund
      - run: npm test
